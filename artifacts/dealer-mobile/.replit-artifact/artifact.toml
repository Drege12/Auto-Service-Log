kind = "mobile"
previewPath = "/dealer-mobile/"
title = "Dealer Tracker Mobile"
version = "1.0.0"
id = "artifacts/dealer-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/dealer-mobile/" ]
localPort = 20068

[services.development]
run = "pnpm --filter @workspace/dealer-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dealer-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/dealer-mobile", "run", "serve" ]

[services.env]
PORT = "20068"
BASE_PATH = "/dealer-mobile/"
